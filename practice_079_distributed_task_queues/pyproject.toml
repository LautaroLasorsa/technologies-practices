[project]
name = "practice-079-distributed-task-queues"
version = "0.1.0"
description = "Distributed Task Queues: Celery & ARQ Worker Patterns"
requires-python = ">=3.12"
dependencies = [
    "celery[redis]>=5.4,<6",
    "flower>=2.0,<3",
    "arq>=0.26,<1",
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.32,<1",
    "httpx>=0.27,<1",
    "redis>=5.0,<6",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
