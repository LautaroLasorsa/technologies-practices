services:
  # ---------------------------------------------------------------------------
  # Redis 7.x: Single instance for advanced patterns practice
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: redis-076b
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data: null
