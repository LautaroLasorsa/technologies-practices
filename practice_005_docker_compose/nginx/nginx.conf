upstream api_gateway {
    # Docker Compose DNS resolves "api_gateway" to the container IP(s).
    # If api_gateway is scaled with replicas, Nginx round-robins across them.
    server api_gateway:8000;
}

upstream dashboard {
    server dashboard:8001;
}

server {
    listen 80;
    server_name localhost;

    # --- API Gateway routes ---
    location /api/ {
        # Trailing "/" strips the /api/ prefix: /api/tasks -> /tasks
        proxy_pass http://api_gateway/;

        # Forward the original Host header (e.g., "localhost") instead of
        # the upstream name ("api_gateway"). Required for apps that generate
        # URLs or validate the Host (e.g., CORS, CSRF, redirect targets).
        proxy_set_header Host $host;

        # Pass the real client IP. Without this, the backend sees Nginx's
        # internal Docker IP as the requester -- useless for logging/rate-limiting.
        proxy_set_header X-Real-IP $remote_addr;

        # Append the client IP to the X-Forwarded-For chain. If multiple
        # proxies exist, each one appends, producing "client, proxy1, proxy2".
        # Backends use this to trace the full request path.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell the backend whether the original request was HTTP or HTTPS.
        # Critical for apps that generate absolute URLs or enforce HTTPS
        # redirects (e.g., FastAPI's root_path + OpenAPI schema).
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Dashboard routes ---
    location /dashboard/ {
        proxy_pass http://dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Root redirect ---
    location = / {
        return 302 /dashboard/;
    }

    # --- Health check for Nginx itself ---
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
