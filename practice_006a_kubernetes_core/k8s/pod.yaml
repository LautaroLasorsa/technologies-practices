# pod.yaml — A bare Pod running the task-tracker container.
#
# ── Exercise Context ──────────────────────────────────────────────────
# This exercise teaches the foundational structure of Kubernetes manifests:
# apiVersion, kind, metadata, and spec. Understanding bare Pods clarifies why
# higher-level controllers (Deployments) are necessary for production workloads.
#
# Concepts to learn:
#   - apiVersion, kind, metadata, spec — the four top-level fields of every K8s object
#   - containerPort is informational (documentation), not a firewall rule
#   - imagePullPolicy: Never — tells K8s to use the local image (built inside minikube)
#   - A bare Pod has NO self-healing: if it dies, nothing restarts it
#
# Docs: https://kubernetes.io/docs/concepts/workloads/pods/

# apiVersion: which API group + version to use. "v1" = core group (stable).
#   Core (v1): Pod, Service, ConfigMap, Secret, Namespace
#   Apps (apps/v1): Deployment, ReplicaSet, StatefulSet
#   Pattern: <group>/<version> — core omits the group name, so "v1" means "core/v1"
apiVersion: v1
kind: Pod
metadata:
    # TODO(human): Give this pod a name. Use "task-tracker".
    # name: ???

    name: "task-tracker"
    namespace: "practice"
    labels:
        # TODO(human): Add a label "app: task-tracker" so selectors can find this pod.
        # Labels are key-value pairs — think of them as tags for filtering.
        # Hint: app: task-tracker

        app: task-tracker

spec:
    containers:
        # TODO(human): Define a single container with:
        #   - name: task-tracker
        #   - image: task-tracker:v1
        #   - imagePullPolicy: Never   (use the local image, don't pull from a registry)
        #       Options: Always       — pull from registry every time (default for :latest tag)
        #                IfNotPresent — pull only if not cached on the node (default for versioned tags like :v1)
        #                Never        — only use local images, error if not found (minikube/kind dev workflow)
        #   - containerPort: 5000      (inside the "ports" list)
        #       containerPort is purely DOCUMENTATION — it tells K8s and humans which port
        #       the container listens on. It does NOT open, expose, or restrict the port.
        #       The container is reachable on port 5000 whether you declare it or not.
        #       Compare with Docker's EXPOSE: same idea, informational only.
        #       Actual external access requires a Service (006b) or port-forward.
        #
        # Structure:
        #   - name: <container-name>
        #     image: <image:tag>
        #     imagePullPolicy: Never
        #     ports:
        #       - containerPort: <port>

        - name: task-tracker
          image: task-tracker:v1
          imagePullPolicy: Never
          ports:
              - containerPort: 5000
